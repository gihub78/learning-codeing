<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 固定圆角墙体版</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a1a; 
            overflow: hidden; 
        }
        canvas { 
            background: #90EE90; /* 浅绿色草地 */
            border: 4px solid #ffffff;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1400" height="840"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const playerImg = new Image(); 
    playerImg.src = '67.png'; 

    const player = {
        x: 700, y: 700, // 初始位置在底部中央
        width: 50, height: 50,
        speed: 6,
        walkCycle: 0,
        isMoving: false
    };

    // --- 【固定布局】手动定义的 12 堵墙 ---
    const walls = [
        // 中央核心区 (4堵)
        { x: 550, y: 320, width: 80, height: 200, radius: 30 },
        { x: 770, y: 320, width: 80, height: 200, radius: 30 },
        { x: 630, y: 240, width: 140, height: 60, radius: 20 },
        { x: 630, y: 540, width: 140, height: 60, radius: 20 },

        // 左侧区域 (3堵)
        { x: 200, y: 150, width: 60, height: 200, radius: 15 },
        { x: 200, y: 490, width: 60, height: 200, radius: 15 },
        { x: 50,  y: 390, width: 100, height: 60, radius: 10 },

        // 右侧区域 (3堵)
        { x: 1140, y: 150, width: 60, height: 200, radius: 15 },
        { x: 1140, y: 490, width: 60, height: 200, radius: 15 },
        { x: 1250, y: 390, width: 100, height: 60, radius: 10 },

        // 顶部和底部掩体 (2堵)
        { x: 550, y: 50,  width: 300, height: 40, radius: 20 },
        { x: 550, y: 750, width: 300, height: 40, radius: 20 }
    ];

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update() {
        let oldX = player.x;
        let oldY = player.y;
        player.isMoving = false;

        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; player.isMoving = true; }

        // 碰撞检测
        for (let wall of walls) {
            if (player.x < wall.x + wall.width &&
                player.x + player.width > wall.x &&
                player.y < wall.y + wall.height &&
                player.y + player.height > wall.y) {
                player.x = oldX;
                player.y = oldY;
            }
        }

        // 边界检测
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        if (player.isMoving) {
            player.walkCycle += 0.2; 
        } else {
            player.walkCycle = 0;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        // 绘制圆角墙体
        ctx.fillStyle = "#A9A9A9"; // 深灰色
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 4;
        walls.forEach(wall => {
            ctx.beginPath();
            ctx.roundRect(wall.x, wall.y, wall.width, wall.height, wall.radius);
            ctx.fill();
            ctx.stroke();
        });

        // 绘制阴影
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(player.x + 25, player.y + 45, 15, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        // 绘制人物
        let bounce = Math.sin(player.walkCycle) * 6;
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        } else {
            ctx.fillStyle = "blue";
            ctx.fillRect(player.x, player.y + bounce, player.width, player.height);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    playerImg.onload = () => loop();
    playerImg.onerror = () => loop();
</script>
</body>
</html>
