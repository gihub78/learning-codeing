<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 镜头跟随版</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #90EE90; border: 4px solid #fff; }
    </style>
</head>
<body>

<!-- 注意：这里的 width/height 是你“看到”的窗口大小 -->
<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 1. 世界大小 (比画布大很多) ---
    const world = { width: 3000, height: 2000 };

    // --- 2. 镜头对象 ---
    const camera = { x: 0, y: 0 };

    const playerImg = new Image(); 
    playerImg.src = '67.png'; 

    const player = {
        x: 1500, y: 1000, // 初始位置在世界中心
        width: 50, height: 50,
        speed: 7, walkCycle: 0, isMoving: false
    };

    // 固定 12 堵墙 (坐标现在是相对于“世界”的)
    const walls = [
        // 中央核心区 (这 4 堵墙现在分得更开了)
                { x: 1300, y: 850, width: 80, height: 200, radius: 30 }, // 左中
        { x: 1620, y: 850, width: 80, height: 200, radius: 30 }, // 右中
        { x: 1425, y: 700, width: 150, height: 60, radius: 20 }, // 上中
        { x: 1425, y: 1140, width: 150, height: 60, radius: 20 }, // 下中

        // 左侧掩体
        { x: 800, y: 700, width: 60, height: 250, radius: 15 },
        { x: 800, y: 1100, width: 60, height: 250, radius: 15 },
        { x: 600, y: 970, width: 120, height: 60, radius: 10 },

        // 右侧掩体
        { x: 2140, y: 700, width: 60, height: 250, radius: 15 },
        { x: 2140, y: 1100, width: 60, height: 250, radius: 15 },
        { x: 2300, y: 970, width: 120, height: 60, radius: 10 },

        // 遥远的顶部和底部边界掩体
        { x: 1350, y: 300,  width: 300, height: 40, radius: 20 },
        { x: 1350, y: 1600, width: 300, height: 40, radius: 20 }
    ];
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update() {
        let oldX = player.x;
        let oldY = player.y;
        player.isMoving = false;

        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; player.isMoving = true; }

        // 碰撞墙体
        for (let wall of walls) {
            if (player.x < wall.x + wall.width && player.x + player.width > wall.x &&
                player.y < wall.y + wall.height && player.y + player.height > wall.y) {
                player.x = oldX; player.y = oldY;
            }
        }

        // 限制在世界边界内
        player.x = Math.max(0, Math.min(world.width - player.width, player.x));
        player.y = Math.max(0, Math.min(world.height - player.height, player.y));

        // --- 【核心逻辑】让镜头跟随玩家 ---
        // 镜头位置 = 玩家中心点 - 画布中心点
        camera.x = player.x + player.width/2 - canvas.width/2;
        camera.y = player.y + player.height/2 - canvas.height/2;

        // 限制镜头不超出世界边界
        camera.x = Math.max(0, Math.min(world.width - canvas.width, camera.x));
        camera.y = Math.max(0, Math.min(world.height - canvas.height, camera.y));

        if (player.isMoving) player.walkCycle += 0.2; else player.walkCycle = 0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        ctx.save(); // 保存当前状态
        // --- 【核心逻辑】平移画布 ---
        // 所有的物体都会向镜头的反方向移动，从而实现“跟随”效果
        ctx.translate(-camera.x, -camera.y);

        // 绘制背景网格（让你感觉到在移动）
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        for(let i=0; i<world.width; i+=100) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,world.height); ctx.stroke();
        }
        for(let j=0; j<world.height; j+=100) {
            ctx.beginPath(); ctx.moveTo(0,j); ctx.lineTo(world.width,j); ctx.stroke();
        }

        // 绘制墙体
        ctx.fillStyle = "#A9A9A9";
        walls.forEach(wall => {
            ctx.beginPath();
            ctx.roundRect(wall.x, wall.y, wall.width, wall.height, wall.radius);
            ctx.fill();
        });

        // 绘制人物阴影和人物
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(player.x + 25, player.y + 45, 15, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        let bounce = Math.sin(player.walkCycle) * 6;
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        }

        ctx.restore(); // 恢复状态，UI（如分数）可以画在 restore 之后，这样 UI 就不会跟着镜头跑
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    playerImg.onload = () => loop();
</script>
</body>
</html>
