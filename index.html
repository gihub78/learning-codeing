<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 完整版</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: Arial; }
        canvas { background: #78ab46; display: block; border: 4px solid #fff; margin: 0 auto; cursor: crosshair; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); pointer-events: none; text-align: center; }
        .bar-bg { width: 200px; height: 18px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #superBar { width: 0%; height: 100%; background: #FFD700; transition: width 0.1s; }
        .hint { color: white; font-weight: bold; text-shadow: 2px 2px #000; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="hint">左键挥刀 | 按住 [F] 瞄准大招</div>
        <div class="bar-bg"><div id="superBar"></div></div>
    </div>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
const socket = io();
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const superBarEl = document.getElementById('superBar');

// 加载图片
const charImg = new Image(); charImg.src = '1.png';
const enemyImg = new Image(); enemyImg.src = '2.png';

const world = { width: 2000, height: 1500 };
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 };
let otherPlayers = {};
let effects = [];
let bullets = [];

const player = {
    id: null, x: 0, y: 0, z: 0, hp: 100, speed: 6,
    superCharge: 0, isJumping: false, jumpProgress: 0,
    isAiming: false, aimAngle: 0, aimDist: 0,
    isAttacking: false, attackAngle: 0, attackTimer: 0
};

// --- 网络事件 ---
socket.on('currentPlayers', ps => {
    Object.keys(ps).forEach(id => {
        if(id === socket.id) Object.assign(player, ps[id]);
        else otherPlayers[id] = ps[id];
    });
});
socket.on('newPlayer', p => otherPlayers[p.id] = p);
socket.on('playerMoved', p => { if(otherPlayers[p.id]) Object.assign(otherPlayers[p.id], p); });
socket.on('hpUpdate', d => { if(d.id === socket.id) player.hp = d.hp; else if(otherPlayers[d.id]) otherPlayers[d.id].hp = d.hp; });
socket.on('superUpdate', d => { if(d.id === socket.id) player.superCharge = d.charge; });
socket.on('enemyDunked', d => effects.push({ x: d.x, y: d.y, life: 30, type: 'dunk' }));
socket.on('enemyMelee', d => { if(otherPlayers[d.id]) { otherPlayers[d.id].isAttacking = true; otherPlayers[d.id].attackAngle = d.angle; otherPlayers[d.id].attackTimer = 10; } });
socket.on('playerRespawn', d => { if(d.id === socket.id) Object.assign(player, d); else if(otherPlayers[d.id]) Object.assign(otherPlayers[d.id], d); });
socket.on('playerDisconnected', id => delete otherPlayers[id]);

// --- 输入 ---
const keys = {};
window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === 'f' && player.superCharge >= 100 && !player.isJumping) player.isAiming = true;
};
window.onkeyup = e => {
    keys[e.key.toLowerCase()] = false;
    if(e.key.toLowerCase() === 'f' && player.isAiming) {
        player.isAiming = false;
        if(player.aimDist > 30) startDunk();
    }
};
canvas.onmousedown = e => {
    if(e.button === 0 && !player.isAttacking && !player.isJumping) {
        const tx = mousePos.x + camera.x, ty = mousePos.y + camera.y;
        player.attackAngle = Math.atan2(ty - (player.y+25), tx - (player.x+25));
        player.isAttacking = true;
        player.attackTimer = 10;
        socket.emit('meleeAttack', { angle: player.attackAngle });
    }
};
canvas.onmousemove = e => {
    const r = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - r.left; mousePos.y = e.clientY - r.top;
};

function startDunk() {
    player.isJumping = true;
    player.jumpProgress = 0;
    player.jumpStart = { x: player.x, y: player.y };
    player.jumpTarget = { 
        x: player.x + Math.cos(player.aimAngle) * player.aimDist,
        y: player.y + Math.sin(player.aimAngle) * player.aimDist 
    };
}

function update() {
    if (!player.id) return;
    if (!player.isJumping) {
        if (keys['w']) player.y -= player.speed;
        if (keys['s']) player.y += player.speed;
        if (keys['a']) player.x -= player.speed;
        if (keys['d']) player.x += player.speed;
        player.x = Math.max(0, Math.min(player.x, world.width-50));
        player.y = Math.max(0, Math.min(player.y, world.height-50));
    } else {
        player.jumpProgress += 0.04;
        player.x = player.jumpStart.x + (player.jumpTarget.x - player.jumpStart.x) * player.jumpProgress;
        player.y = player.jumpStart.y + (player.jumpTarget.y - player.jumpStart.y) * player.jumpProgress;
        player.z = Math.sin(player.jumpProgress * Math.PI) * 200;
        if (player.jumpProgress >= 1) {
            player.isJumping = false; player.z = 0;
            socket.emit('dunkImpact', { x: player.x + 25, y: player.y + 25 });
            effects.push({ x: player.x + 25, y: player.y + 25, life: 30, type: 'dunk' });
        }
    }

    if (player.isAiming) {
        const tx = mousePos.x + camera.x, ty = mousePos.y + camera.y;
        player.aimAngle = Math.atan2(ty - (player.y+25), tx - (player.x+25));
        player.aimDist = Math.min(Math.hypot(tx-(player.x+25), ty-(player.y+25)), 400);
    }

    if(player.isAttacking && --player.attackTimer <= 0) player.isAttacking = false;
    Object.values(otherPlayers).forEach(p => { if(p.isAttacking && --p.attackTimer <= 0) p.isAttacking = false; });

    socket.emit('playerMovement', { x: player.x, y: player.y, z: player.z });
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;
    superBarEl.style.width = player.superCharge + '%';
    effects.forEach((e, i) => { if(--e.life <= 0) effects.splice(i, 1); });
}

function drawPlayer(p, isSelf) {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath(); ctx.ellipse(p.x+25, p.y+45, 20, 10, 0, 0, Math.PI*2); ctx.fill();
    
    ctx.save();
    ctx.translate(p.x+25, p.y-p.z+25);
    // 简单的挥刀动画：身体抖一下
    if(p.isAttacking) ctx.rotate(Math.sin(p.attackTimer)*0.2);
    ctx.drawImage(isSelf ? charImg : enemyImg, -25, -25, 50, 50);
    ctx.restore();

    // 挥刀弧光
    if(p.isAttacking) {
        ctx.save();
        ctx.translate(p.x+25, p.y-p.z+25);
        ctx.rotate(p.attackAngle);
        ctx.strokeStyle = `rgba(255,255,255,${p.attackTimer/10})`;
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(0, 0, 60, -Math.PI/3, Math.PI/3); ctx.stroke();
        ctx.restore();
    }

    ctx.fillStyle = "#333"; ctx.fillRect(p.x, p.y-p.z-15, 50, 6);
    ctx.fillStyle = p.hp > 30 ? "#2ecc71" : "#e74c3c";
    ctx.fillRect(p.x, p.y-p.z-15, (p.hp/100)*50, 6);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 预瞄线
    if(player.isAiming) {
        const tx = player.x+25+Math.cos(player.aimAngle)*player.aimDist;
        const ty = player.y+25+Math.sin(player.aimAngle)*player.aimDist;
        ctx.strokeStyle = "rgba(255,215,0,0.5)"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(tx, ty, 150, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(player.x+25, player.y+25); ctx.lineTo(tx, ty); ctx.stroke();
    }

    Object.values(otherPlayers).forEach(p => drawPlayer(p, false));
    drawPlayer(player, true);

    effects.forEach(e => {
        ctx.strokeStyle = `rgba(255,255,255,${e.life/30})`; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(e.x, e.y, (1-e.life/30)*150, 0, Math.PI*2); ctx.stroke();
    });
    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
