<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 扣篮大招版</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { background: #78ab46; border: 4px solid #fff; cursor: crosshair; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); pointer-events: none; user-select: none; }
        .bar-bg { width: 200px; height: 18px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #superBar { width: 0%; height: 100%; background: #FFD700; transition: width 0.1s; }
        .hint { color: white; text-align: center; margin-bottom: 8px; font-weight: bold; text-shadow: 2px 2px 2px #000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="hintText" class="hint">攻击敌人充能 [E] 释放扣篮大招</div>
        <div class="bar-bg"><div id="superBar"></div></div>
    </div>
    <canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const superBarEl = document.getElementById('superBar');

// 游戏配置
const world = { width: 2000, height: 1500 };
const camera = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 };

// 玩家对象
const player = {
    x: 1000, y: 750, z: 0, // z代表跳跃高度
    width: 50, height: 50,
    speed: 6,
    superCharge: 0,
    isJumping: false,
    jumpProgress: 0,
    jumpStart: {x:0, y:0},
    jumpTarget: {x:0, y:0},
    hp: 100
};

// 目标/敌人
let targets = [
    { x: 1200, y: 750, hp: 100, color: '#f44336' },
    { x: 800, y: 500, hp: 100, color: '#f44336' },
    { x: 1000, y: 1000, hp: 100, color: '#f44336' }
];

const bullets = [];
const effects = []; // 存放爆炸特效
const keys = {};

// 监听输入
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === 'e' && player.superCharge >= 100 && !player.isJumping) {
        startDunk();
    }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mousePos.x = e.clientX - rect.left;
    mousePos.y = e.clientY - rect.top;
});
window.addEventListener('mousedown', () => {
    if (player.isJumping) return;
    fireBullet();
});

function fireBullet() {
    const targetX = mousePos.x + camera.x;
    const targetY = mousePos.y + camera.y;
    const angle = Math.atan2(targetY - (player.y + 25), targetX - (player.x + 25));
    bullets.push({
        x: player.x + 25, y: player.y + 25,
        vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12,
        life: 50
    });
}

function startDunk() {
    player.isJumping = true;
    player.superCharge = 0;
    player.jumpProgress = 0;
    player.jumpStart = { x: player.x, y: player.y };
    
    const targetX = mousePos.x + camera.x;
    const targetY = mousePos.y + camera.y;
    const dist = Math.hypot(targetX - player.x, targetY - player.y);
    const limit = Math.min(dist, 400); // 最大跳跃距离
    const angle = Math.atan2(targetY - player.y, targetX - player.x);
    
    player.jumpTarget = {
        x: player.x + Math.cos(angle) * limit,
        y: player.y + Math.sin(angle) * limit
    };
}

function update() {
    // 1. 玩家移动逻辑
    if (!player.isJumping) {
        if (keys['w']) player.y -= player.speed;
        if (keys['s']) player.y += player.speed;
        if (keys['a']) player.x -= player.speed;
        if (keys['d']) player.x += player.speed;
    } else {
        // 2. 大招跳跃逻辑 (抛物线)
        player.jumpProgress += 0.025; // 跳跃速度
        player.x = player.jumpStart.x + (player.jumpTarget.x - player.jumpStart.x) * player.jumpProgress;
        player.y = player.jumpStart.y + (player.jumpTarget.y - player.jumpStart.y) * player.jumpProgress;
        // 弧度公式实现高度z
        player.z = 4 * 250 * player.jumpProgress * (1 - player.jumpProgress);

        if (player.jumpProgress >= 1) {
            player.isJumping = false;
            player.z = 0;
            performSmash();
        }
    }

    // 3. 子弹逻辑
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy; b.life--;
        targets.forEach(t => {
            if (Math.hypot(b.x - t.x, b.y - t.y) < 30) {
                t.hp -= 10;
                player.superCharge = Math.min(100, player.superCharge + 8);
                b.life = 0;
            }
        });
        if (b.life <= 0) bullets.splice(i, 1);
    });

    // 4. 特效逻辑
    effects.forEach((ef, i) => {
        ef.life--;
        if (ef.life <= 0) effects.splice(i, 1);
    });

    // 5. 镜头跟随
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;

    // UI更新
    superBarEl.style.width = player.superCharge + '%';
    superBarEl.style.background = player.superCharge >= 100 ? '#fff' : '#FFD700';
    document.getElementById('hintText').innerText = player.superCharge >= 100 ? "大招就绪！按 [E] 扣篮！" : "攻击敌人充能大招";
}

function performSmash() {
    // 砸地 AOE 伤害判定
    effects.push({ x: player.x + 25, y: player.y + 25, life: 30, radius: 150 });
    targets.forEach(t => {
        if (Math.hypot(player.x + 25 - t.x, player.y + 25 - t.y) < 150) {
            t.hp -= 40;
            // 简单的击退效果
            const angle = Math.atan2(t.y - player.y, t.x - player.x);
            t.x += Math.cos(angle) * 50;
            t.y += Math.sin(angle) * 50;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // 绘制地板网格
    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    for(let i=0; i<world.width; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, world.height); ctx.stroke();
    }

    // 绘制阴影
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(player.x + 25, player.y + 50, 20 + player.z/10, 10 + player.z/20, 0, 0, Math.PI*2);
    ctx.fill();

    // 绘制目标
    targets.forEach(t => {
        if (t.hp > 0) {
            ctx.fillStyle = t.color;
            ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.fill();
            // 血条
            ctx.fillStyle = 'black'; ctx.fillRect(t.x-25, t.y-40, 50, 6);
            ctx.fillStyle = 'red'; ctx.fillRect(t.x-25, t.y-40, (t.hp/100)*50, 6);
        }
    });

    // 绘制子弹
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill();
    });

    // 绘制砸地特效
    effects.forEach(ef => {
        ctx.strokeStyle = `rgba(255, 165, 0, ${ef.life/30})`;
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.arc(ef.x, ef.y, (1 - ef.life/30) * ef.radius, 0, Math.PI*2); ctx.stroke();
    });

    // 绘制跳跃落点预告
    if (player.isJumping) {
        ctx.strokeStyle = "white";
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.arc(player.jumpTarget.x + 25, player.jumpTarget.y + 25, 150, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
    }

    // 绘制玩家 (受z轴偏移影响)
    ctx.fillStyle = "#2196F3";
    ctx.fillRect(player.x, player.y - player.z, player.width, player.height);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x, player.y - player.z, player.width, player.height);

    ctx.restore();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
