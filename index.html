<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗简单Demo</title>
    <style>
        /* 页面样式：让游戏居中，背景黑色 */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a1a; 
            overflow: hidden;
        }
        /* 画布样式：设置草地背景色和边框 */
        canvas { 
            background: #90EE90; /* 类似荒野乱斗的草地绿 */
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<!-- 游戏舞台 -->
<canvas id="gameCanvas" width="1400" height="840"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const playerImg = new Image(); 
    playerImg.src = '67.png'; 

    const player = {
        x: 400, y: 250,
        width: 50, height: 50,
        speed: 5,
        walkCycle: 0,
        isMoving: false
    };

    // --- 【新内容】定义墙体 ---
    // 数组里的每一个 {} 代表一堵墙
    const walls = [
        { x: 150, y: 100, width: 80, height: 150 }, // 左侧长墙
        { x: 450, y: 250, width: 150, height: 80 }, // 右侧横墙
        { x: 300, y: 50,  width: 200, height: 40 }  // 顶部窄墙
    ];

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function update() {
        // 先记录移动前的位置，如果撞墙了就退回这里
        let oldX = player.x;
        let oldY = player.y;
        player.isMoving = false;

        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; player.isMoving = true; }

        // --- 【新内容】碰撞检测逻辑 ---
        for (let wall of walls) {
            if (player.x < wall.x + wall.width &&
                player.x + player.width > wall.x &&
                player.y < wall.y + wall.height &&
                player.y + player.height > wall.y) {
                // 发现重叠，强制退回到旧位置
                player.x = oldX;
                player.y = oldY;
            }
        }

        if (player.isMoving) {
            player.walkCycle += 0.2; 
        } else {
            player.walkCycle = 0;
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        // --- 【新内容】绘制深灰色墙体 ---
        ctx.fillStyle = "#A9A9A9"; // 深灰色
        walls.forEach(wall => {
            ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
            // 给墙加个黑色边框
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 3;
            ctx.strokeRect(wall.x, wall.y, wall.width, wall.height);
        });

        // 绘制阴影
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(player.x + 25, player.y + 45, 15, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        // 绘制人物
        let bounce = Math.sin(player.walkCycle) * 6;
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    playerImg.onload = () => loop();
</script>
</body>
</html>
