<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 随机圆角墙体版</title>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a1a; 
            overflow: hidden; 
        }
        /* 浅绿色草地背景 */
        canvas { 
            background: #90EE90; 
            border: 4px solid #ffffff;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1400" height="840"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 1. 加载图片 ---
    const playerImg = new Image(); 
    playerImg.src = '67.png'; // 确保你的图片名正确

    // --- 2. 人物属性 ---
    const player = {
        x: 700, 
        y: 420,
        width: 50, 
        height: 50,
        speed: 6,
        walkCycle: 0,
        isMoving: false
    };

    // --- 3. 随机生成 12 堵圆角墙 ---
    const walls = [];
    function generateWalls() {
        for (let i = 0; i < 12; i++) {
            walls.push({
                x: Math.random() * (canvas.width - 200) + 50,
                y: Math.random() * (canvas.height - 200) + 50,
                width: Math.random() * 120 + 60,  // 宽度在60-180之间
                height: Math.random() * 120 + 60, // 高度在60-180之间
                radius: 20 // 圆角弧度
            });
        }
    }
    generateWalls();

    // --- 4. 键盘监听 ---
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // --- 5. 逻辑更新 (包含碰撞检测) ---
    function update() {
        let oldX = player.x;
        let oldY = player.y;
        player.isMoving = false;

        // 移动控制
        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; player.isMoving = true; }

        // 碰撞检测：遍历 12 堵墙
        for (let wall of walls) {
            if (player.x < wall.x + wall.width &&
                player.x + player.width > wall.x &&
                player.y < wall.y + wall.height &&
                player.y + player.height > wall.y) {
                // 撞墙了，退回到上一帧的位置
                player.x = oldX;
                player.y = oldY;
            }
        }

        // 屏幕边界检测
        player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
        player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

        // 行走动画计时
        if (player.isMoving) {
            player.walkCycle += 0.2; 
        } else {
            player.walkCycle = 0;
        }
    }

    // --- 6. 画面绘制 ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        // 绘制圆角墙体
        ctx.fillStyle = "#A9A9A9"; // 深灰色墙
        ctx.strokeStyle = "#555";  // 边框
        ctx.lineWidth = 4;
        walls.forEach(wall => {
            ctx.beginPath();
            ctx.roundRect(wall.x, wall.y, wall.width, wall.height, wall.radius);
            ctx.fill();
            ctx.stroke();
        });

        // 绘制人物阴影
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(player.x + 25, player.y + 45, 15, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        // 绘制人物 (带有上下晃动效果)
        let bounce = Math.sin(player.walkCycle) * 6;
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        } else {
            // 图片未加载时的占位符
            ctx.fillStyle = "blue";
            ctx.fillRect(player.x, player.y + bounce, player.width, player.height);
        }
    }

    // --- 7. 游戏循环 ---
    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    // 启动
    playerImg.onload = () => loop();
    playerImg.onerror = () => loop(); // 加载失败也运行
</script>
</body>
</html>
