<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗 - 大招版</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        canvas { background: #90EE90; border: 4px solid #fff; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: white; text-align: center; margin-bottom: 5px;">按 [E] 释放大招 (冲刺)</div>
    <div style="width: 200px; height: 20px; background: #333; border: 2px solid #fff; border-radius: 10px; overflow: hidden;">
        <div id="superBar" style="width: 0%; height: 100%; background: #FFD700; transition: width 0.1s;"></div>
    </div>
</div>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const superBarEl = document.getElementById('superBar');

    const world = { width: 3000, height: 2000 };
    const camera = { x: 0, y: 0 };

    const playerImg = new Image(); 
    playerImg.src = '78.png'; 

    const player = {
        x: 1500, y: 1000, 
        width: 50, height: 50,
        speed: 7, 
        normalSpeed: 7,
        superSpeed: 25, // 大招冲刺速度
        walkCycle: 0, 
        isMoving: false,
        superCharge: 0, // 大招充能进度 (0-100)
        isSupering: false,
        superTimer: 0
    };

    // 沿用你的24堵墙...
    const walls = [
        { x: 1250, y: 850, width: 80, height: 300, radius: 30 }, 
        { x: 1670, y: 850, width: 80, height: 300, radius: 30 }, 
        { x: 1425, y: 650, width: 150, height: 60, radius: 20 }, 
        { x: 1425, y: 1250, width: 150, height: 60, radius: 20 },
        // ... (此处省略其余20堵墙，逻辑相同)
    ];

    const keys = {};
    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        // 释放大招
        if (e.key.toLowerCase() === 'e' && player.superCharge >= 100 && !player.isSupering) {
            activateSuper();
        }
    });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    function activateSuper() {
        player.isSupering = true;
        player.superCharge = 0;
        player.superTimer = 15; // 持续15帧的高速移动
    }

    function update() {
        let oldX = player.x;
        let oldY = player.y;
        player.isMoving = false;

        // 自动充能 (演示用，正式版应该是攻击敌人充能)
        if (player.superCharge < 100) player.superCharge += 0.2;
        superBarEl.style.width = player.superCharge + '%';

        // 处理大招状态
        let currentSpeed = player.speed;
        if (player.isSupering) {
            currentSpeed = player.superSpeed;
            player.superTimer--;
            if (player.superTimer <= 0) player.isSupering = false;
        }

        if (keys['w'] || keys['arrowup']) { player.y -= currentSpeed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += currentSpeed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= currentSpeed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += currentSpeed; player.isMoving = true; }

        for (let wall of walls) {
            if (player.x < wall.x + wall.width && player.x + player.width > wall.x &&
                player.y < wall.y + wall.height && player.y + player.height > wall.y) {
                player.x = oldX; player.y = oldY;
                player.isSupering = false; // 撞墙停止大招
            }
        }

        // 镜头跟随逻辑
        camera.x = player.x + player.width/2 - canvas.width/2;
        camera.y = player.y + player.height/2 - canvas.height/2;
        camera.x = Math.max(0, Math.min(world.width - canvas.width, camera.x));
        camera.y = Math.max(0, Math.min(world.height - canvas.height, camera.y));

        if (player.isMoving) player.walkCycle += 0.2; else player.walkCycle = 0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // 绘制墙体
        ctx.fillStyle = "#A9A9A9";
        walls.forEach(wall => {
            ctx.beginPath();
            ctx.roundRect(wall.x, wall.y, wall.width, wall.height, wall.radius);
            ctx.fill();
        });

        // 大招特效 (残留影子)
        if (player.isSupering) {
            ctx.fillStyle = "rgba(255, 215, 0, 0.4)";
            ctx.fillRect(player.x - 10, player.y - 10, 70, 70);
        }

        // 绘制人物
        let bounce = Math.sin(player.walkCycle) * 6;
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        }

        ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    playerImg.onload = () => loop();
</script>
</body>
</html>
