<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>荒野大乱斗简单Demo</title>
    <style>
        /* 页面样式：让游戏居中，背景黑色 */
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #1a1a1a; 
            overflow: hidden;
        }
        /* 画布样式：设置草地背景色和边框 */
        canvas { 
            background: #548a31; /* 类似荒野乱斗的草地绿 */
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<!-- 游戏舞台 -->
<canvas id="gameCanvas" width="1400" height="840"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 1. 加载人物图片 ---
    const playerImg = new Image(); 
    // 这里可以换成你自己的图片路径，例如 'hero.png'
    playerImg.src = '67.png'; 

    // --- 2. 人物属性设置 ---
    const player = {
        x: 400,         // 初始X坐标
        y: 250,         // 初始Y坐标
        width: 60,      // 人物宽度
        height: 60,     // 人物高度
        speed: 5,       // 移动速度
        walkCycle: 0,   // 走路动画计时器
        isMoving: false // 是否正在移动
    };

    // --- 3. 监听键盘按键 ---
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

    // --- 4. 逻辑更新函数 ---
    function update() {
        player.isMoving = false;

        // 检测 WASD 或 方向键
        if (keys['w'] || keys['arrowup']) { player.y -= player.speed; player.isMoving = true; }
        if (keys['s'] || keys['arrowdown']) { player.y += player.speed; player.isMoving = true; }
        if (keys['a'] || keys['arrowleft']) { player.x -= player.speed; player.isMoving = true; }
        if (keys['d'] || keys['arrowright']) { player.x += player.speed; player.isMoving = true; }

        // 边界检测：防止人物走出地图
        if (player.x < 0) player.x = 0;
        if (player.y < 0) player.y = 0;
        if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        if (player.y > canvas.height - player.height) player.y = canvas.height - player.height;

        // 如果在移动，增加动画计时
        if (player.isMoving) {
            player.walkCycle += 0.2; 
        } else {
            player.walkCycle = 0; // 停止时重置动画
        }
    }

    // --- 5. 画面绘制函数 ---
    function draw() {
        // 每帧开始前先清空画布
        ctx.clearRect(0, 0, canvas.width, canvas.height); 

        // 【绘制阴影】
        ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.ellipse(player.x + 30, player.y + 55, 20, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        // 【计算行走晃动】
        // 使用正弦函数 Math.sin 实现平滑的上下浮动
        let bounce = Math.sin(player.walkCycle) * 7;

        // 【绘制人物图片】
        // 如果图片还没加载完，先画个方块占位
        if (playerImg.complete) {
            ctx.drawImage(playerImg, player.x, player.y + bounce, player.width, player.height);
        } else {
            ctx.fillStyle = "yellow";
            ctx.fillRect(player.x, player.y + bounce, player.width, player.height);
        }
    }

    // --- 6. 游戏主循环 ---
    function loop() {
        update(); // 更新位置
        draw();   // 绘制画面
        requestAnimationFrame(loop); // 帧同步循环
    }

    // 图片加载完成后正式启动
    playerImg.onload = function() {
        loop();
    };

    // 万一网络不好图片加载失败，也要启动游戏以免黑屏
    playerImg.onerror = function() {
        console.log("图片加载失败，使用备用方块。");
        loop();
    };

</script>
</body>
</html>
